<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Registration System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .dashboard-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .header h2 {
            color: #333;
            font-size: 28px;
        }

        .btn-logout {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn-logout:hover {
            background: #c82333;
        }

        .welcome-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        .welcome-message h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .profile-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }

        .profile-card h4 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #dee2e6;
        }

        .profile-details p {
            margin-bottom: 12px;
            color: #555;
        }

        .profile-details strong {
            display: inline-block;
            width: 100px;
            color: #333;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .dashboard-box {
                padding: 25px;
            }
            
            .header h2 {
                font-size: 24px;
            }
            
            .profile-details strong {
                width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard-box">
            <div class="header">
                <h2>Dashboard</h2>
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>
            
            <div id="userInfo" class="user-info">
                <div class="welcome-message">
                    <h3 id="welcomeText">Loading...</h3>
                </div>
                
                <div class="profile-card">
                    <h4>Your Profile</h4>
                    <div class="profile-details">
                        <p><strong>Name:</strong> <span id="profileName">-</span></p>
                        <p><strong>Email:</strong> <span id="profileEmail">-</span></p>
                        <p><strong>Username:</strong> <span id="profileUsername">-</span></p>
                        <p><strong>Age:</strong> <span id="profileAge">-</span></p>
                        <p><strong>Gender:</strong> <span id="profileGender">-</span></p>
                        <p><strong>Mobile:</strong> <span id="profileMobile">-</span></p>
                        <p><strong>Member Since:</strong> <span id="profileCreated">-</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/dashboard.js"></script>
</body>
</html>
